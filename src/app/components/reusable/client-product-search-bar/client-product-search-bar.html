<article>
    <form action="" [formGroup]="form" (ngSubmit)="submit()">
        <section>

            <div>
                <label for="product">Nombre</label>
                <input type="text" name="product" id="product" formControlName="tern" placeholder="Termino de busqueda...">
            </div>
            
            <div>
                <label for="categories">Categorias</label>
                <app-category-dropdown-select id="categories" formControlName="category_id" [categories]="categories()"/>
            </div>
            
            <div>
                <label for="checkbox">Incluir productos sin stock?</label>
                <input type="checkbox" name="checkbox" id="checkbox">
            </div>
            
            <div>
                <button type="submit">Buscar</button>
                <button type="button" (click)="reset()">Reinicio</button>
            </div>
        </section>
    </form>
</article>
