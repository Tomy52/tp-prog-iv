<article>
    <div class="title">
        <h2>ID orden: {{orderData()!.orderId}}</h2>
        <h4>Creación: {{orderData()!.createdAt}}</h4>

    <div class="buttons">
        <p>Total: ${{orderData()!.total}}</p>
        <button (click)="showOrderDataPopUp()">Ver datos</button>
    </div>
</article>
