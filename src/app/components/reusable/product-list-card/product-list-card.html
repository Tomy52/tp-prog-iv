<article [ngClass]="isDisabled() ? 'disabled' : ''">
  <div class="title">
    <h2>{{ productInfo().name }}</h2>
  </div>

  <div class="info">
    <p>Id: {{ productInfo().idProduct }}</p>
    <p>Estado: {{ productInfo().status === ProductStatus.Enabled ? "Activo" : "Inactivo" }}</p>
    <p>Stock: {{ productInfo().stock }}</p>
    <img [src]="getPictureURL()" alt="A picture of {{productInfo().name}}">
    <p class="price">{{getPrice()}}</p>
  </div>

  <div class="boton-admin" *appAllowViewUser="['ROLE_ADMIN','ROLE_MANAGER']">
    <button (click)="updateProduct()">Modificar</button>
    <button class="baja-producto" [disabled]="isDisabled()" (click)="deleteProduct()">Dar de baja</button>
  </div>

</article>
