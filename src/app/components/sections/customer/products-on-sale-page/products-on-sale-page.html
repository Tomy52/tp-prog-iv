<section>
  <h1>Lista de productos en venta</h1>
  @if (pageData() != null && !errMsg) {

    <app-client-product-search-bar></app-client-product-search-bar>

    @if(pageData()!.content.length === 0) {
      <h1>No se encontraron resultados</h1>
    } @else {
      <app-customer-product-list [products]="pageData()!.content"/> 
      <app-page-buttons (back_signal)="goBack()"
                        (next_signal)="goForward()"
                        [back_active]="pageData()!.first || searching"
                        [forward_active]="pageData()!.last || searching"
                        [current_page]="pageData()!.number"
                        [max_page]="pageData()!.totalPages"

                        (size_changed)="changePageSize($event)"
                        [page_size_ops]="pageSizeOptions">
      </app-page-buttons>
    }
  } @else {
    <h1> {{ errMsg }}</h1>
  }
</section>
