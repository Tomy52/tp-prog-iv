<article>
    <div class="horizontal name">
        <h2>{{productInfo().name}} - ${{productInfo().price}}</h2>
        <img src="{{getImageUrl()}}" alt="imagen de {{productInfo().name}}">

    </div>

    <div class="stock">
        <h2>Unidades restantes: {{calculateStockRemainingStock()}}</h2>
      @if(this.taken_stock() == 0){
        <button (click)="selectProduct(productInfo().idProduct)"> Agregar al carrito</button>
      } @else {
        <div class="buttons">
          <button class="quantityControl remove-stock" (click)="unselectProduct(productInfo().idProduct)" [disabled]="taken_stock() == 0">-</button>
          <p>{{taken_stock()}}</p>
          <button class="quantityControl" (click)="selectProduct(productInfo().idProduct)" [disabled]="calculateStockRemainingStock() <= 0">+</button>
        </div>
      }



    </div>
</article>
