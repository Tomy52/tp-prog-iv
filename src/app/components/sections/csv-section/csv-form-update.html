<section>
    <h2>Carga de precios en CSV</h2>
    <article>
    <form action="" (ngSubmit)="completeForm()" [formGroup]="form">
        <label for="proveedor">Proveedor:</label>
        <app-supplier-dropdown-select [suppliers]="suppliers()" formControlName="id" id="proveedor" name="proveedor"></app-supplier-dropdown-select>

        <label for="file">Archivo</label>
        <input type="file" name="file" id="file" formControlName="file" (change)="onFileSelected($event)" accept=".csv"> 
        
        <label for="mode">Acción</label>
        <app-switch-with-text [on_text]="'Cargar'" [off_text]="'Modificar'" formControlName="csv_mode"></app-switch-with-text>

        <button type="submit" [disabled]="!isFormValid()">Cargar</button>
    </form>
    </article>

    <app-failed-products-component [failed_product_resp]="failed_products_response()"/>
</section>
