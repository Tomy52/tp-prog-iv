<article>
    <form action="" (ngSubmit)="completeForm()" [formGroup]="form">
        <label for="proveedor">Proveedor:</label>
        <app-supplier-dropdown-select [suppliers]="suppliers()" formControlName="id" id="proveedor" name="proveedor"></app-supplier-dropdown-select>
    
        <label for="file">Archivo</label>
        <input type="file" name="file" id="file" formControlName="file" accept=".csv"> 
        
        <button type="submit" [disabled]="!isFormValid()">Cargar</button>
    </form>
</article>
