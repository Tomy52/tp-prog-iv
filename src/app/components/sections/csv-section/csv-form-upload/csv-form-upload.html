<section>
    <h2>Cargar Lista de Precios</h2>
    <article>
    <form action="" (ngSubmit)="completeForm()" [formGroup]="form">
        <label for="supplier">Proveedor:</label>
        <app-supplier-dropdown-select [suppliers]="suppliers()" formControlName="id" id="supplier" name="supplier"></app-supplier-dropdown-select>
    
        <label for="file">Archivo</label>
        <input type="file" name="file" id="file" formControlName="file" (change)="onFileSelected($event)" accept=".csv"> 
    
        <label for="profit-margin">Margen de ganancia (En %)</label>
        <input type="number" min="0" name="profit-margin" id="profit-margin" formControlName="profit_margin">

        <button type="submit" [disabled]="!isFormValid()">Cargar</button>
    </form>
    </article>

    <app-failed-products-component [failed_product_resp]="failed_products_response()"/>

</section>
