<section>
  <table class="users-table">
    <thead>
    <tr>
      <th>DNI</th>

      <th>Rol</th>
      <th>Estado</th>
      <th>Detalle</th>
    </tr>
    </thead>
    <tbody>

      }

  </table>
</section>
