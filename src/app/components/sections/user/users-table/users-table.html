<section>
  <table class="users-table">
    <thead>
    <tr>
      <th>ID</th>
      <th>DNI</th>
      <th>Nombre de usuario</th>
      <th>Rol</th>
      <th>Estado</th>
      <th>Detalle</th>
    </tr>
    </thead>
    <tbody>
      @for(user of users(); track user.idUser) {
        <tr>
          <td>#{{user.idUser}}</td>
          <td>{{user.dni}}</td>
          <td>{{user.credential.username}}</td>
          <td>{{user.credential.role}}</td>
          <td>
            <span class="badge"
                  [class.badge-active]="user.status === 'ENABLED'"
                  [class.badge-inactive]="user.status === 'DISABLED'">
            {{ user.status === 'ENABLED' ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td><button [routerLink]="['/users', user.idUser]">Ver</button></td>
        </tr>
      }
    </tbody>
  </table>
</section>
