<nav>
  <button class="nav-bar-button" title="Ver barra de navegación" (click)="openSidebar()">
    <img class="img-button-menu" src="images/iconoMenu.png" alt="menuHamburguesa"></button>
  <h1 routerLink="main-menu" title="Regresar al menú principal">PreciOSO</h1>
  <div class="user-button-container">
    <app-shopping-cart *appAllowViewUser="['ROLE_CUSTOMER']"></app-shopping-cart>

    <div class="user-dropdown-container">
      <button class="nav-bar-button user-button">
        {{username()}}
      </button>

      <div class="dropdown-content">
        <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
      </div>
    </div>
  </div>

</nav>

@if(isSidenavOpen()){
  <div class="menuDiv"
    animate.enter="enter-animation"
    animate.leave="leave-animation">

    @if (authService.getRole() == "ROLE_CUSTOMER") {
      <app-customer-sidebar (clickOutside)="closeSidebar()"/>
    }

    <!-- admin should get their own bar maybe -->
    @if (authService.getRole() == "ROLE_MANAGER" || authService.getRole() == "ROLE_EMPLOYEE") {
      <app-sidebar-component (clickOutside)="closeSidebar()"/>
    }

    @if (authService.getRole() == "ROLE_ADMIN")
    {
      <app-admin-sidebar (clickOutside)="closeSidebar()"/>
    }

  </div>
  <div class="overlay"></div>
}
